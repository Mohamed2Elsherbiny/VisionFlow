services:
  redis:
    image: redis:7-alpine
    container_name: visionflow-redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build:
      context: ./api
    container_name: visionflow-api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    restart: always

  worker:
    build:
      context: ./worker
    container_name: visionflow-worker
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MODEL_PATH=/app/models/yolov7.onnx
    volumes:
      # Mount a local 'models' directory to the container to supply the ONNX model file
      - ./models:/app/models
    deploy:
      resources:
        reservations: {}
        # Uncomment below if you have NVIDIA GPUs and want to use GPU execution providers
        # devices:
          #   - driver: nvidia
          #     count: 1
          #     capabilities: [gpu]
    restart: always